version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version=v{{.Version}}
      - -X main.revision={{.ShortCommit}}
    main: ./cmd/gh-infra/
    flags:
      - -trimpath

archives:
  - formats: ["tar.gz"]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Os }}_
      {{- .Arch }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        formats: ["zip"]

changelog:
  sort: asc
  use: github
  groups:
    - title: Features
      regexp: "^feat"
      order: 0
    - title: Bug Fixes
      regexp: "^fix"
      order: 1
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  prerelease: auto
  draft: false
  footer: >-
    ### Installation

    - [Homebrew](https://brew.sh/): `brew install babarot/tap/gh-infra`

    ---
    Generated by [GoReleaser](https://github.com/goreleaser/goreleaser).

brews:
  - repository:
      owner: babarot
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/babarot/gh-infra
    description: A gh extension for infrastructure management
    license: MIT
    url_template: "https://github.com/babarot/gh-infra/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
